<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIRUNE 指名預約系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<div id="loading-overlay">
    <div class="loading-content">
        <p>🐾 正在為您準備貓咪中...</p>
        <div class="loader"></div>
    </div>
</div>
<body>

<div class="booking-container">
    <h1>DIRUNE 指名預約系統</h1>
<div class="menu-container">
    <p class="menu-title">📜 DIRUNE 完整價目表</p>
    <div class="menu-image-wrapper">
        <img src="Image/Attractors_Menu.png" alt="DIRUNE Menu" class="clickable-menu" id="menuImage">
    </div>
    <p class="menu-hint">※ 點擊圖片可查看完整品項</p>
</div>

    <form id="bookingForm">
        <div class="form-group">
    <label for="name">角色名稱 / 暱稱</label>
    <input type="text" id="name" name="name" required placeholder="例如：Inu@泰坦">
</div>

       <div class="form-group">
    <label>預約日期 (本月開店日)</label>
    <div class="checkbox-group">
        <label class="checkbox-item">
            <input type="radio" name="date" value="2026-04-20" required>
            <span>2026/04/20 (一)</span>
        </label>
        <label class="checkbox-item">
            <input type="radio" name="date" value="2026-04-22">
            <span>2026/04/22 (三)</span>
        </label>
    </div>
</div>

       <div class="form-group">
    <label>預約時段 (可多選)</label>
    <p class="form-notice">
        ※ 選擇時段後會顯示可指名的貓咪，若選項變灰代表該時段已被預約。
    </p>
    <div class="time-checkbox-group">
        <label class="time-item">
            <input type="checkbox" name="time" value="21:30 - 22:00">
            <span>21:30 - 22:00</span>
        </label>
        <label class="time-item">
            <input type="checkbox" name="time" value="22:00 - 22:30">
            <span>22:00 - 22:30</span>
        </label>
        <label class="time-item">
            <input type="checkbox" name="time" value="22:30 - 23:00">
            <span>22:30 - 23:00</span>
        </label>
        <label class="time-item">
            <input type="checkbox" name="time" value="23:00 - 23:30">
            <span>23:00 - 23:30</span>
        </label>
        <label class="time-item">
            <input type="checkbox" name="time" value="23:30 - 00:00">
            <span>23:30 - 00:00</span>
        </label>
    </div>
</div>
<div id="cat-selection-section">
    <div class="price-notice">
        <p>※ 每位指名費用為 50,000 Gil（30分鐘），依人數計費。</p>
        <p>※ 每筆預約最多指名 3 位（例：3 位（30分鐘）總計 150,000 Gil）。</p>
    </div>

    <div class="cat-checkbox-group">
    <label class="cat-item"><input type="checkbox" name="cats" value="埃斯咪"><span>埃斯咪</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="堡"><span>堡</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="蒼雨"><span>蒼雨</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="赤羽"><span>赤羽</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="倒頭"><span>倒頭</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="燈蒔"><span>燈蒔</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="Eating"><span>Eating</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="古·拉哈堤婭"><span>古·拉哈堤婭</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="洛摩"><span>洛摩</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="燎"><span>燎</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="Misca"><span>Misca</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="默默"><span>默默</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="貓糕"><span>貓糕</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="Rayn"><span>Rayn</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="蝦蝦"><span>蝦蝦</span></label>
    <label class="cat-item"><input type="checkbox" name="cats" value="維梧爾"><span>維梧爾</span></label>
<label class="cat-item disabled-cat">
    <input type="checkbox" name="cats" value="Inu" disabled>
    <span>(SP) Inu</span>
</label>
<label class="cat-item disabled-cat">
    <input type="checkbox" name="cats" value="伊萊諾斯" disabled>
    <span>(SP) 伊萊諾斯</span>
</label>
    </div>
   
</div> <p style="text-align: right; color: #8d6e63; font-weight: bold; margin: 10px 0;">
    預計指名費用：<span id="top-total">0</span> Gil
</p>
<div class="form-group">
    <label for="contact-info">聯絡方法</label>
    <input type="text" id="contact-info" name="contact" placeholder="例如：Discord ID 或 Threads 帳號" required>
</div>
        <div class="form-group">
            <label for="note">備註 (如有)</label>
            <textarea id="notes" name="note" rows="3" placeholder="例如出席人數，聚會目的等"></textarea>
        </div>


    
    <div class="total-price-container">
        <div class="price-row">已選時段數：<span id="display-periods">0</span></div>
        <div class="price-row">指名貓咪數：<span id="display-cats">0</span></div>
        <div id="sketch-service-row" style="display: none; color: #d4a373; font-weight: bold;">
    <span>【維梧爾限定】速寫服務：</span>
    <span id="display-sketch-status">150,000 Gil</span>
</div>
        <hr>
        <div class="price-total">
            <span>預計總金額：</span>
            <span id="total-amount">0</span> Gil
        </div>
    </div>

    <button type="submit" id="submitBtn">提交預約</button>


</form></div>

    <script src="script.js"></script>
</body>
</html>
